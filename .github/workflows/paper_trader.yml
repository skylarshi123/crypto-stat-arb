name: Paper Trader (Hourly)

on:
  schedule:
    # Runs at the top of every hour, 24/7. GitHub Actions uses UTC.
    - cron: "0 * * * *"

  # Lets you trigger a manual run from the GitHub Actions UI
  workflow_dispatch:

# Fix for exit code 128: grant the built-in GITHUB_TOKEN write access
# so the bot can push positions.json and trader.log back to the repo.
permissions:
  contents: write

env:
  # Silence the Node.js 20 deprecation warning
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  trade:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Pass the write-enabled token so git push works without extra auth
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run paper trader
        run: python src/live_trader.py
        # ── Switch to live trading ──────────────────────────────────────────
        # When ready, replace the line above with:
        #   run: python src/live_trader.py --live
        # and add your Kraken keys as GitHub repository secrets, then uncomment:
        # env:
        #   KRAKEN_API_KEY: ${{ secrets.KRAKEN_API_KEY }}
        #   KRAKEN_API_SECRET: ${{ secrets.KRAKEN_API_SECRET }}

      - name: Save state and logs back to repo
        # Run this even if the trader script failed, so the error log gets
        # committed and you can see what went wrong in the file history.
        if: always()
        run: |
          git config --global user.email "paper-trader[bot]@users.noreply.github.com"
          git config --global user.name "Paper Trader Bot"
          git add state/positions.json logs/trader.log
          # Only commit if something actually changed (no-op hours make no noise)
          git diff --staged --quiet || git commit -m "chore: update trading state [skip ci]"
          git push
