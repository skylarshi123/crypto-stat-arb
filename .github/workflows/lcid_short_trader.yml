name: LCID Short Trader (Market Hours)

on:
  schedule:
    # Every 15 minutes, Mon–Fri, 13:30–21:00 UTC (= 9:30–17:00 ET, covers market + small buffer)
    - cron: "*/15 13-20 * * 1-5"
    - cron: "0,15,30,45 21 * * 1-5"

  # Manual trigger from GitHub Actions UI (useful for testing)
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  trade:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install yfinance

      - name: Run LCID paper trader
        run: python src/lucid_short_trader.py
        # ── Switch to live mode (Robinhood MCP) ──────────────────────────────
        # Once the Robinhood MCP server is connected and tested, replace above with:
        #   run: python src/lucid_short_trader.py --live
        # No additional secrets needed if using Robinhood's MCP OAuth flow.
        # See: robinhood.com/us/en/support/agentic-trading
        # ─────────────────────────────────────────────────────────────────────

      - name: Save state and logs back to repo
        if: always()
        run: |
          git config --global user.email "lcid-trader[bot]@users.noreply.github.com"
          git config --global user.name "LCID Trader Bot"
          git add state/lcid_positions.json logs/lcid_trader.log
          git diff --staged --quiet || git commit -m "chore: update LCID trading state [skip ci]"
          git push
